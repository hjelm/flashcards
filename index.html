<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Flash Cards</title>
    <style>
      html {
        --textColor: #aaa;
      }
      body {
        background: #000;
        color: #eee;
        font-family: Arial, Helvetica, sans-serif;
      }
      input {
        font-size: 40px;
      }
      ul {
        list-style: square;
        list-style-position: unset;
        padding-left: 1em;
        margin-top: 0.5em;
      }
      a {
        color: var(--textColor);
        text-decoration: unset;
        font-weight: bold;
      }
      .button {
        background-color: #111;
        border-radius: 5px;
        padding: 1em;
      }
      .nav-bar {
        width: 38em;
      }
      .list-title {
        margin-bottom: 0.5em;
      }
      .text-xl {
        font-size: 28px;
      }
      .py-1 {
        padding-top: 1em;
        padding-bottom: 1em;
      }
      .px-1 {
        padding-left: 1em;
        padding-right: 1em;
      }
      .px-0_5 {
        padding-left: 0.5em;
        padding-right: 0.5em;
      }
      .pb-1 {
        padding-bottom: 1rem;
      }
      .mt-1 {
        margin-top: 1em;
      }
      .gap-0_5 {
        gap: 0.5em;
      }
      .centered {
        margin-left: auto;
        margin-right: auto;
      }
      .content {
        padding: 4em;
        width: 30em;
        background-color: #111;
        margin-top: 1em;
      }
      .self-center {
        justify-self: center;
      }
      .items-center {
        justify-items: center;
      }
      .text-lg {
        font-size: 4rem;
      }
      .text-gray {
        color: #aaa;
      }
      .bg-gray {
        background-color: #aaa;
      }
      .rounded-xl {
        border-radius: 1em;
      }
      .rounded-sm {
        border-radius: 1rem;
      }
      .border-none {
        border: none;
      }
      .place-stretch {
        display: flex;
        place-self: stretch;
      }
      .flex {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="nav-bar centered flex gap-0_5">
      <a class="button" href="#exam" id="examLink">Exam mode</a>
      <a class="button" href="#list" id="listLink">View wordlist</a>
    </div>
    <div class="content centered rounded-xl">
      <div id="app"></div>
    </div>
  </body>
  <script src="flashcards.js"></script>
</html>
