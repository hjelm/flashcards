<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Flash Cards</title>
    <style>
      body {
        background: #000;
        color: #eee;
      }

      input {
        font-size: 40px;
      }

      ul {
        list-style: none;
        list-style-position: unset;
        padding-left: unset;
        margin-top: 0.5em;
      }

      .list-title {
        margin-bottom: 0.5em;
      }

      .py-1 {
        padding-top: 1em;
        padding-bottom: 1em;
      }

      .px-1 {
        padding-left: 1em;
        padding-right: 1em;
      }

      .px-0_5 {
        padding-left: 0.5em;
        padding-right: 0.5em;
      }

      .pb-1 {
        padding-bottom: 1rem;
      }
      .mt-1 {
        margin-top: 1em;
      }

      .centered {
        margin-left: auto;
        margin-right: auto;
      }

      .content {
        padding: 4em;
        width: 30em;
        background-color: #111;
        margin-top: 1em;
      }

      .self-center {
        justify-self: center;
      }
      .items-center {
        justify-items: center;
      }

      .text-lg {
        font-size: 4rem;
      }

      .text-gray {
        color: #aaa;
      }
      .bg-gray {
        background-color: #aaa;
      }
      .rounded-xl {
        border-radius: 1em;
      }
      .rounded-sm {
        border-radius: 1rem;
      }
      .border-none {
        border: none;
      }
      .place-stretch {
        display: flex;
        place-self: stretch;
      }
    </style>
  </head>
  <body>
    <div class="content centered rounded-xl">
      <div id="app"></div>
    </div>
  </body>
  <script src="flashcards.js"></script>
</html>
