<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Flash Cards</title>
    <style>
      body {
        background: #000;
        color: #eee;
      }

      input {
        font-size: 40px;
      }

      .py-1 {
        padding-top: 1em;
        padding-bottom: 1em;
      }

      .pb-1 {
        padding-bottom: 1rem;
      }

      .centered {
        margin-left: auto;
        margin-right: auto;
      }

      .content {
        padding: 4em;
        width: 27em;
        background-color: #111;
      }

      .self-center {
        justify-self: center;
      }

      .text-lg {
        font-size: 4rem;
      }
    </style>
  </head>
  <body>
    <div class="content centered">
      <div id="main"></div>
      <div>
        <input type="text" id="answer" onkeyup="updateDisabled()" />
      </div>
      <div class="py-1">
        <button type="button" onclick="checkAnswer()" id="checkAnswerButton">
          Check word
        </button>
        <button type="button" onclick="nextWord()">Next word</button>
      </div>
      <div id="footer"></div>
    </div>
  </body>
  <script src="flashcards.js"></script>
</html>
